<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>JoJo's Bar — Pre-Shift Board</title>
<script>
// ============================================================
//  MARK — UPDATE THIS SECTION DAILY BY 2PM
//  DO NOT EDIT ANYTHING BELOW THE DASHED LINE
// ============================================================

var DATE = "Monday, April 14, 2026";

var SPECIALS = [
  { category: "App",     item: "Burrata with Heirloom Tomato",      price: "$14" },
  { category: "Fish",    item: "Pan Seared Halibut",                 price: "$38" },
  { category: "Pasta",   item: "Cacio e Pepe",                       price: "$24" },
  { category: "Protein", item: "8oz Filet with Truffle Butter",      price: "$52" },
  { category: "Dessert", item: "Seasonal Tiramisu",                  price: "$12" },
];

var WINE = { name: "Barolo — Ceretto", detail: "Bold, dry, pairs beautifully with red meat", price: "$18 glass / $72 bottle" };
var COCKTAIL = { name: "Aperol Spritz", detail: "Light, refreshing, perfect for the season", price: "$14" };

var EIGHTY_SIX = [
  "Halibut",
  "Burrata",
  "Salmon",
  "Lobster Bisque",
];

var RESERVATIONS = {
  lunch:  42,
  dinner: 87,
  covers: 129,
  notes: [
    "Smith party — Table 12 — 7:00 PM — Anniversary",
    "Johnson buyout — Private room — 8:00 PM — 20 guests",
  ]
};

// ============================================================
//  DO NOT EDIT BELOW THIS LINE
// ============================================================
</script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 1920px; height: 1080px; overflow: hidden; background: #fff; font-family: Arial, sans-serif; color: #1a1a1a; }
body { padding: 36px 56px; display: flex; flex-direction: column; height: 1080px; }

.header { display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
.brand { font-size: 20px; color: #1a4a8a; letter-spacing: 4px; font-weight: bold; text-transform: uppercase; }
.title { font-size: 52px; font-weight: bold; color: #1a4a8a; line-height: 1.1; }
.date-label { font-size: 20px; color: #888; margin-top: 4px; }
.update-badge { background: #1a4a8a; color: #fff; font-size: 18px; font-weight: bold; padding: 10px 24px; border-radius: 8px; text-align: center; line-height: 1.4; }
.divider { height: 3px; background: #1a4a8a; margin: 12px 0 16px; border-radius: 1px; flex-shrink: 0; }

.content { flex: 1; display: grid; grid-template-columns: 1.2fr 1fr 0.8fr; gap: 20px; }

/* PANELS */
.panel { display: flex; flex-direction: column; gap: 12px; }
.panel-title { font-size: 42px; font-weight: bold; color: #1a4a8a; border-bottom: 3px solid #1a4a8a; padding-bottom: 8px; flex-shrink: 0; }

/* SPECIALS */
.special-item { display: flex; justify-content: space-between; align-items: baseline; border-bottom: 1px solid #e8e8e8; padding: 10px 0; flex: 1; }
.special-left { display: flex; flex-direction: column; }
.special-category { font-size: 18px; color: #e8a020; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
.special-name { font-size: 38px; color: #1a1a1a; font-weight: bold; }
.special-price { font-size: 38px; color: #1a4a8a; font-weight: bold; }
.specials-list { flex: 1; display: flex; flex-direction: column; justify-content: space-between; }

/* 86 LIST */
.eighty-six-list { flex: 1; display: flex; flex-direction: column; justify-content: flex-start; gap: 16px; }
.eighty-six-item { font-size: 38px; color: #c00000; font-weight: bold; padding: 10px 16px; background: #fff0f0; border-left: 6px solid #c00000; border-radius: 4px; }

/* RESERVATIONS */
.res-counts { display: flex; gap: 16px; flex-shrink: 0; }
.res-card { flex: 1; background: #f0f6ff; border-radius: 8px; padding: 14px 16px; text-align: center; border-left: 4px solid #1a4a8a; }
.res-val { font-size: 52px; font-weight: bold; color: #1a4a8a; }
.res-lbl { font-size: 18px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

.wine-cocktail { display: flex; flex-direction: column; gap: 12px; flex-shrink: 0; }
.wc-card { background: #f0f6ff; border-radius: 8px; padding: 14px 18px; border-left: 4px solid #e8a020; }
.wc-type { font-size: 18px; color: #e8a020; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
.wc-name { font-size: 38px; font-weight: bold; color: #1a4a8a; }
.wc-detail { font-size: 20px; color: #555; margin-top: 4px; }
.wc-price { font-size: 24px; color: #1a4a8a; font-weight: bold; margin-top: 4px; }

.notes-list { flex: 1; display: flex; flex-direction: column; gap: 12px; }
.note-item { font-size: 28px; color: #1a1a1a; padding: 10px 16px; background: #f9f9f9; border-left: 4px solid #1a4a8a; border-radius: 4px; line-height: 1.4; }
.notes-title { font-size: 24px; font-weight: bold; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-top: 8px; flex-shrink: 0; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="brand">JoJo's Bar &amp; Bar Fuoco</div>
    <div class="title">Pre-Shift Board</div>
    <div class="date-label" id="date-display"></div>
  </div>
  <div class="update-badge">Updated Daily<br>by 2:00 PM</div>
</div>
<div class="divider"></div>

<div class="content" id="content"></div>

<script>
document.getElementById('date-display').textContent = DATE;

var content = document.getElementById('content');

// ---- COLUMN 1: SPECIALS ----
var col1 = document.createElement('div');
col1.className = 'panel';
var t1 = document.createElement('div');
t1.className = 'panel-title';
t1.textContent = "Tonight's Specials";
col1.appendChild(t1);
var sl = document.createElement('div');
sl.className = 'specials-list';
SPECIALS.forEach(function(s) {
  var item = document.createElement('div');
  item.className = 'special-item';
  item.innerHTML = '<div class="special-left"><span class="special-category">' + s.category + '</span><span class="special-name">' + s.item + '</span></div><span class="special-price">' + s.price + '</span>';
  sl.appendChild(item);
});
col1.appendChild(sl);
content.appendChild(col1);

// ---- COLUMN 2: 86 LIST + WINE/COCKTAIL ----
var col2 = document.createElement('div');
col2.className = 'panel';
var t2 = document.createElement('div');
t2.className = 'panel-title';
t2.textContent = '86 List';
col2.appendChild(t2);
var el = document.createElement('div');
el.className = 'eighty-six-list';
EIGHTY_SIX.forEach(function(item) {
  var d = document.createElement('div');
  d.className = 'eighty-six-item';
  d.textContent = '86  ' + item;
  el.appendChild(d);
});
col2.appendChild(el);

var wc = document.createElement('div');
wc.className = 'wine-cocktail';
var wCard = document.createElement('div');
wCard.className = 'wc-card';
wCard.innerHTML = '<div class="wc-type">Wine of the Week</div><div class="wc-name">' + WINE.name + '</div><div class="wc-detail">' + WINE.detail + '</div><div class="wc-price">' + WINE.price + '</div>';
var cCard = document.createElement('div');
cCard.className = 'wc-card';
cCard.innerHTML = '<div class="wc-type">Cocktail of the Week</div><div class="wc-name">' + COCKTAIL.name + '</div><div class="wc-detail">' + COCKTAIL.detail + '</div><div class="wc-price">' + COCKTAIL.price + '</div>';
wc.appendChild(wCard);
wc.appendChild(cCard);
col2.appendChild(wc);
content.appendChild(col2);

// ---- COLUMN 3: RESERVATIONS ----
var col3 = document.createElement('div');
col3.className = 'panel';
var t3 = document.createElement('div');
t3.className = 'panel-title';
t3.textContent = 'Reservations';
col3.appendChild(t3);

var rc = document.createElement('div');
rc.className = 'res-counts';
[{val: RESERVATIONS.lunch, lbl:'Lunch'},{val: RESERVATIONS.dinner, lbl:'Dinner'},{val: RESERVATIONS.covers, lbl:'Covers'}].forEach(function(r) {
  var card = document.createElement('div');
  card.className = 'res-card';
  card.innerHTML = '<div class="res-val">' + r.val + '</div><div class="res-lbl">' + r.lbl + '</div>';
  rc.appendChild(card);
});
col3.appendChild(rc);

var nt = document.createElement('div');
nt.className = 'notes-title';
nt.textContent = 'Notes of Interest';
col3.appendChild(nt);

var nl = document.createElement('div');
nl.className = 'notes-list';
RESERVATIONS.notes.forEach(function(note) {
  var d = document.createElement('div');
  d.className = 'note-item';
  d.textContent = note;
  nl.appendChild(d);
});
col3.appendChild(nl);
content.appendChild(col3);
</script>

</body>
</html>
