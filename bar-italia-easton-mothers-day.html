<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bar Italia Easton — Mother's Day</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: 'Montserrat', sans-serif;
    background: #000;
  }

  .stage {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .slide {
    position: relative;
    width: 1920px;
    height: 1080px;
    transform-origin: center center;
    background:
      radial-gradient(ellipse at top left, #fce8ec 0%, transparent 55%),
      radial-gradient(ellipse at bottom right, #e8f0e2 0%, transparent 55%),
      linear-gradient(135deg, #fef7f0 0%, #fdf4ec 50%, #f6ebe0 100%);
    overflow: hidden;
  }

  @media (max-aspect-ratio: 16/9) {
    .slide { transform: scale(calc(100vw / 1920)); }
  }
  @media (min-aspect-ratio: 16/9) {
    .slide { transform: scale(calc(100vh / 1080)); }
  }

  .botanical {
    position: absolute;
    pointer-events: none;
    opacity: 0.55;
  }

  .botanical.top-left {
    top: -40px;
    left: -40px;
    width: 380px;
    height: 380px;
  }

  .botanical.bottom-right {
    bottom: -50px;
    right: -50px;
    width: 400px;
    height: 400px;
    transform: rotate(180deg);
  }

  .botanical.mid-right {
    top: 240px;
    right: -60px;
    width: 260px;
    height: 260px;
    opacity: 0.35;
  }

  .botanical.mid-left {
    bottom: 200px;
    left: -50px;
    width: 240px;
    height: 240px;
    opacity: 0.35;
    transform: rotate(180deg);
  }

  .petal {
    position: absolute;
    width: 18px;
    height: 18px;
    border-radius: 50% 0 50% 0;
    opacity: 0.6;
  }
  .petal.p1 { top: 160px; left: 720px; background: #f4b8c4; transform: rotate(25deg); }
  .petal.p2 { top: 240px; right: 480px; background: #f8c8a0; transform: rotate(-15deg); }
  .petal.p3 { bottom: 240px; left: 380px; background: #f4b8c4; transform: rotate(45deg); }
  .petal.p4 { top: 380px; left: 240px; background: #e8c2d4; transform: rotate(-30deg); width: 14px; height: 14px; }
  .petal.p5 { bottom: 340px; right: 320px; background: #f8c8a0; transform: rotate(60deg); width: 14px; height: 14px; }

  .header {
    position: relative;
    text-align: center;
    padding-top: 80px;
    z-index: 5;
  }

  .brand-mark {
    display: inline-block;
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 500;
    letter-spacing: 6px;
    color: #6b4423;
    text-transform: uppercase;
    padding: 0 24px;
    position: relative;
  }

  .brand-mark::before,
  .brand-mark::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 60px;
    height: 1px;
    background: #6b4423;
  }
  .brand-mark::before { left: -70px; }
  .brand-mark::after { right: -70px; }

  .location {
    font-family: 'Montserrat', sans-serif;
    font-size: 16px;
    font-weight: 400;
    letter-spacing: 5px;
    color: #8b6f47;
    text-transform: uppercase;
    margin-top: 12px;
  }

  .main {
    position: relative;
    text-align: center;
    margin-top: 50px;
    z-index: 5;
  }

  .first-tag {
    display: inline-block;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 30px;
    color: #c44569;
    margin-bottom: 10px;
    font-weight: 500;
  }

  .first-tag .star {
    color: #d4a574;
    margin: 0 12px;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 132px;
    font-weight: 600;
    color: #2d4a2b;
    line-height: 1.0;
    letter-spacing: -1px;
  }

  h1 .ampersand {
    font-style: italic;
    font-weight: 400;
    color: #c44569;
    font-size: 120px;
  }

  h1 .day {
    display: block;
    margin-top: -6px;
  }

  .time-card {
    position: relative;
    margin: 50px auto 0;
    width: 900px;
    background: rgba(255, 255, 255, 0.7);
    border: 1px solid rgba(196, 69, 105, 0.25);
    border-radius: 8px;
    padding: 28px 40px;
    z-index: 5;
    box-shadow: 0 8px 30px rgba(139, 111, 71, 0.08);
  }

  .time-card-inner {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 50px;
  }

  .time-block, .date-block { text-align: center; }

  .time-label {
    font-family: 'Montserrat', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 3px;
    color: #8b6f47;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .time-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 50px;
    font-weight: 600;
    color: #2d4a2b;
    line-height: 1;
  }

  .time-value .meridiem {
    font-size: 26px;
    font-weight: 400;
    color: #6b4423;
    margin-left: 4px;
  }

  .time-divider {
    width: 1px;
    height: 70px;
    background: linear-gradient(to bottom, transparent, #c44569 50%, transparent);
  }

  .date-month {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 26px;
    color: #c44569;
    font-weight: 500;
  }

  .date-day {
    font-family: 'Cormorant Garamond', serif;
    font-size: 50px;
    font-weight: 600;
    color: #2d4a2b;
    line-height: 1;
  }

  .date-year {
    font-family: 'Montserrat', sans-serif;
    font-size: 12px;
    letter-spacing: 4px;
    color: #8b6f47;
    margin-top: 4px;
  }

  .footer-message {
    position: absolute;
    bottom: 70px;
    left: 0;
    right: 0;
    text-align: center;
    z-index: 5;
  }

  .footer-message .quote {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 26px;
    color: #6b4423;
    font-weight: 400;
  }

  .footer-message .ornament {
    margin: 10px auto 0;
    width: 200px;
    height: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .footer-message .ornament::before,
  .footer-message .ornament::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #d4a574;
  }

  .footer-message .ornament .diamond {
    width: 6px;
    height: 6px;
    background: #c44569;
    transform: rotate(45deg);
    margin: 0 12px;
  }
</style>
</head>
<body>
<div class="stage">
<div class="slide">

    <g fill="none" stroke="#7a9168" stroke-width="1.2" stroke-linecap="round">

  <svg class="botanical bottom-right" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">

        <circle cx="0" cy="-6" r="4.5" fill="#f4b8c4"/>
        <circle cx="5.5" cy="-1.5" r="4.5" fill="#f4b8c4"/>

        <circle cx="0" cy="-5" r="4" fill="#f8c8a0"/>

    </g>
  </svg>

  <svg class="botanical mid-right" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <g fill="none" stroke="#7a9168" stroke-width="1" stroke-linecap="round">
      <path d="M 100 180 Q 100 100 100 30"/>
      <path d="M 100 130 Q 70 110 50 95"/>

    </g>
    <g fill="#9bb087" opacity="0.7">
      <ellipse cx="75" cy="120" rx="12" ry="5" transform="rotate(20 75 120)"/>
      <ellipse cx="125" cy="80" rx="12" ry="5" transform="rotate(-20 125 80)"/>
    </g>
    <g transform="translate(100, 30)">
      <circle cx="0" cy="-7" r="5" fill="#f4b8c4"/>
      <circle cx="6" cy="-2" r="5" fill="#f4b8c4"/>
      <circle cx="3.5" cy="6" r="5" fill="#f4b8c4"/>

      <circle cx="0" cy="0" r="2.5" fill="#d4a574"/>
    </g>
  </svg>

  <svg class="botanical mid-left" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <g fill="none" stroke="#7a9168" stroke-width="1" stroke-linecap="round">
      <path d="M 100 180 Q 100 100 100 30"/>

      <circle cx="-6" cy="-2" r="5" fill="#f8c8a0"/>

  </svg>

  <div class="petal p1"></div>
  <div class="petal p2"></div>
  <div class="petal p3"></div>
  <div class="petal p4"></div>
  <div class="petal p5"></div>

  <div class="header">
    <div class="brand-mark">Bar Italia</div>
    <div class="location">Easton Town Center</div>
  </div>

  <div class="main">
    <div class="first-tag">
      <span class="star">✿</span>our very first<span class="star">✿</span>
    </div>
    <h1>
      Mother's <span class="ampersand">&</span>
      <span class="day">Day</span>
    </h1>
  </div>

  <div class="time-card">
    <div class="time-card-inner">
      <div class="date-block">
        <div class="date-month">Sunday</div>
        <div class="date-day">May 10</div>
        <div class="date-year">2026</div>
      </div>
      <div class="time-divider"></div>
      <div class="time-block">
        <div class="time-label">Doors Open</div>
        <div class="time-value">10:30<span class="meridiem">AM</span></div>
      </div>
    </div>
  </div>

  <div class="footer-message">
    <div class="quote">Let's make her day unforgettable.</div>
    <div class="ornament">
      <div class="diamond"></div>
    </div>
  </div>

</div>
</div>
</body>
</html>
