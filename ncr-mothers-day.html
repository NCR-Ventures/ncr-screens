  /* ---- Vignette + warm overlay ----
     Two layers: a soft vignette so corners darken, and a warm wash that
     unifies the photo with the brand palette and pushes contrast off the
     subjects so the typography wins.
  ------------------------------------- */
  .vignette {
    position:absolute;
    top:0; left:0; right:0; bottom:0;
    background:
      radial-gradient(ellipse at 30% 35%, transparent 0%, transparent 25%, rgba(20,10,8,0.70) 90%),
      linear-gradient(180deg, rgba(40,15,15,0.40) 0%, rgba(20,8,8,0.65) 100%);
    z-index:2;
  }
  .warm-wash {
    position:absolute;
    top:0; left:0; right:0; bottom:0;
    background:
      linear-gradient(135deg, rgba(168,50,74,0.25) 0%, rgba(0,0,0,0.15) 50%, rgba(61,74,42,0.35) 100%);
    z-index:3;
    mix-blend-mode:multiply;
  }

  /* ---- Frame ---- */
  .border-frame {
    position:absolute;
    top:30px; left:30px; right:30px; bottom:30px;
    border:1px solid rgba(232,212,168,0.45);
    border-radius:4px;
    pointer-events:none;
    z-index:8;
  }

  /* ---- Wordmark top ---- */
  .wordmark {
    position:absolute;
    top:60px; left:0; right:0;
    text-align:center;
    z-index:10;
  }
  .wordmark .ncr {
    font-family:'Cinzel','Georgia',serif;
    font-size:24px;
    color:#e8d4a8;
    letter-spacing:14px;
    font-weight:600;
    text-indent:14px;
    text-shadow:0 2px 8px rgba(0,0,0,0.6);
  }
  .wordmark .tagline {
    font-family:'Cormorant Garamond','Georgia',serif;
    font-style:italic;
    font-size:18px;
    color:#e8d4a8;
    letter-spacing:6px;
    margin-top:4px;
    text-indent:6px;
    opacity:0.8;
    text-shadow:0 2px 8px rgba(0,0,0,0.6);
  }
  .wordmark .ornament {
    display:inline-block;
    width:60px; height:1px;
    background:#e8d4a8;
    margin:8px 14px 0;
    vertical-align:middle;
    opacity:0.7;
  }

  /* ---- Centerpiece message card (no border, just dark glass) ---- */
  .message {
    position:absolute;
    top:50%; left:50%;
    transform:translate(-50%, -50%);
    width:1500px;
    text-align:center;
    z-index:11;
    padding:60px 80px;
  }

  .happy {
    font-family:'Cinzel','Georgia',serif;
    font-size:50px;
    color:#fbeee2;
    letter-spacing:24px;
    font-weight:600;
    text-indent:24px;
    text-shadow:0 3px 14px rgba(0,0,0,0.7);
  }
  .mothers-day {
    font-family:'Great Vibes', cursive;
    font-size:200px;
    color:#fbe4ec;
    line-height:0.95;
    font-weight:400;
    margin-top:-4px;
    text-shadow:
      0 4px 20px rgba(0,0,0,0.75),
      0 0 60px rgba(168,50,74,0.5);
    white-space:nowrap;
  }

  .divider-row {
    display:flex; align-items:center; justify-content:center;
    margin-top:18px; gap:22px;
  }
  .divider-line { width:200px; height:1px; background:#e8d4a8; opacity:0.7; }
  .divider-heart { color:#e8d4a8; font-size:24px; opacity:0.85; }

  .salute {
    margin-top:30px;
    font-family:'Cinzel','Georgia',serif;
