  }
  .bg-tint {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 25% 30%, rgba(134, 0, 56, 0.45) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 75%, rgba(253, 187, 48, 0.20) 0%, transparent 50%),
      linear-gradient(180deg, rgba(0,0,0,0.65) 0%, rgba(0,0,0,0.35) 50%, rgba(0,0,0,0.75) 100%);
    z-index: 1;
  }

  /* Court-line texture overlay */
  .court-lines {
    position: absolute;
    inset: 0;
    background-image:
      repeating-linear-gradient(90deg, transparent 0, transparent 119px, rgba(253,187,48,0.04) 119px, rgba(253,187,48,0.04) 120px),
      repeating-linear-gradient(0deg, transparent 0, transparent 119px, rgba(253,187,48,0.04) 119px, rgba(253,187,48,0.04) 120px);
    pointer-events: none;
  }

  /* Stadium light glare */
  .glare {
    position: absolute;
    top: -200px;
    right: -200px;
    width: 900px;
    height: 900px;
    background: radial-gradient(circle, rgba(253,187,48,0.18) 0%, transparent 60%);
    pointer-events: none;
  }

  /* ---------- TOP BAR ---------- */
  .topbar {
    z-index: 10;
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 90px;
    background: linear-gradient(90deg, #860038 0%, #6e0028 100%);
    border-bottom: 4px solid #fdbb30;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 60px;
    color: #fff;
  }
  .topbar-left {
    font-family: 'Arial', sans-serif;
    font-weight: 900;
    font-size: 26px;
    letter-spacing: 3px;
  }
  .topbar-left span {
    color: #fdbb30;
  }
  .topbar-right {
    font-family: 'Arial', sans-serif;
    font-weight: 700;
    font-size: 22px;
    letter-spacing: 2px;
    opacity: 0.85;
  }

  /* ---------- MAIN HEADLINE ---------- */
  .headline-block {
    position: absolute;
    top: 140px;
    left: 80px;
    right: 80px;
    text-align: center;
    z-index: 5;
  }

  .pregame-tag {
    display: inline-block;
    background: #fdbb30;
    color: #000;
    font-family: 'Arial Black', sans-serif;
    font-size: 32px;
    font-weight: 900;
    letter-spacing: 8px;
    padding: 12px 40px;
    transform: skew(-8deg);
    margin-bottom: 30px;
    box-shadow: 0 6px 30px rgba(253,187,48,0.4);
  }
  .pregame-tag span { display: inline-block; transform: skew(8deg); }

  .game-line {
    font-family: 'Arial Black', sans-serif;
    font-size: 110px;
    font-weight: 900;
    line-height: 0.9;
    color: #fff;
    letter-spacing: -2px;
    text-shadow:
      0 0 30px rgba(253,187,48,0.5),
      4px 4px 0 #860038;
  }
  .game-line .six {
    color: #fdbb30;
    font-size: 150px;
    display: inline-block;
    transform: translateY(10px) rotate(-3deg);
    text-shadow:
      0 0 40px rgba(253,187,48,0.8),
      5px 5px 0 #860038;
  }

  .tonight-line {
    font-family: 'Arial Black', sans-serif;
    font-size: 44px;
    font-weight: 900;
    color: #fdbb30;
    letter-spacing: 6px;
    margin-top: 6px;
    text-shadow: 0 4px 20px rgba(0,0,0,0.8);
  }

  /* ---------- MATCHUP CARD ---------- */
  .matchup {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    align-items: center;
    gap: 30px;
    z-index: 4;
  }
  .team {
    text-align: left;
  }
  .team-sub {
    font-family: 'Arial', sans-serif;
    font-size: 40px;
    color: #fdbb30;
    letter-spacing: 8px;
    margin-bottom: 6px;
    font-weight: 700;
  }
  .team-name {
    font-family: 'Arial Black', sans-serif;
    font-size: 190px;
    font-weight: 900;
    color: #fff;
    letter-spacing: 2px;
    line-height: 0.95;
  }
  .team.cavs .team-name {
    color: #fdbb30;
    text-shadow: 0 0 40px rgba(253,187,48,0.6);
  }

  .versus {
    font-family: 'Arial Black', sans-serif;
    font-size: 130px;
    font-weight: 900;
    color: #fff;
    opacity: 0.5;
    transform: skew(-10deg);
    text-shadow: 0 4px 20px rgba(0,0,0,0.8);
  }

  .series-bar {
    position: absolute;
    bottom: 200px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.6);
    border: 2px solid #fdbb30;
    padding: 14px 50px;
    font-family: 'Arial Black', sans-serif;
    font-size: 28px;
    color: #fff;
    letter-spacing: 5px;
    text-align: center;
  }
  .series-bar .lead {
    color: #fdbb30;
  }

  /* ---------- TIME + VENUE ---------- */
  .info-row {
    position: absolute;
    bottom: 90px;
    left: 80px;
    right: 80px;
    display: flex;
    justify-content: center;
    gap: 80px;
    z-index: 4;
  }
  .info-block {
    text-align: center;
  }
  .info-label {
    font-family: 'Arial', sans-serif;
    font-size: 18px;
    color: #fdbb30;
    letter-spacing: 6px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .info-value {
    font-family: 'Arial Black', sans-serif;
    font-size: 42px;
    color: #fff;
    font-weight: 900;
    letter-spacing: 2px;
  }

  /* ---------- BOTTOM BAR / LABOR NOTE ---------- */
  .bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 56px;
    background: linear-gradient(90deg, #0a0a0a 0%, #1a1a1a 50%, #0a0a0a 100%);
    border-top: 3px solid #fdbb30;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 60px;
    font-family: 'Arial', sans-serif;
    color: #fff;
  }
  .labor-note {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 2px;
    color: #fff;
  }
  .labor-note .accent {
    color: #fdbb30;
  }
  .ncr-mark {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 4px;
    color: #fdbb30;
    opacity: 0.85;
  }

  /* ---------- SCREEN GLOW EDGE ---------- */
  .edge-glow {
    position: absolute;
    inset: 0;
    box-shadow: inset 0 0 200px rgba(0,0,0,0.6);
    pointer-events: none;
  }
</style>
</head>
